<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64b5f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976d2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gearGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef5350;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d32f2f;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Brain shape (left side) -->
  <path d="M60,80 C60,50 80,30 100,30 C120,30 140,50 140,80 C140,110 130,120 120,125 C110,130 100,130 90,125 C80,120 70,110 70,80 Z" fill="url(#brainGradient)" />

  <!-- Gear shape (right side) -->
  <path d="M100,100 m-30,-30 l10,0 l5,-15 l10,0 l5,15 l15,0 l0,10 l-15,0 l0,15 l-10,0 l0,-15 l-15,0 Z" fill="url(#gearGradient)" />

  <!-- Connection elements representing fusion -->
  <path d="M90,100 Q100,95 110,100" stroke="#ffb300" stroke-width="3" fill="none" />
  <path d="M100,90 Q105,100 100,110" stroke="#ffb300" stroke-width="3" fill="none" />

  <!-- Circuit-like details in the brain area -->
  <path d="M75,60 Q85,55 95,60" stroke="#64b5f6" stroke-width="2" fill="none" />
  <path d="M80,70 Q90,65 100,70" stroke="#64b5f6" stroke-width="2" fill="none" />
  <path d="M85,80 Q95,75 105,80" stroke="#64b5f6" stroke-width="2" fill="none" />

  <!-- Mechanical details in the gear area -->
  <circle cx="100" cy="100" r="8" fill="#78909c" />
  <line x1="100" y1="92" x2="100" y2="108" stroke="#78909c" stroke-width="2" />
  <line x1="92" y1="100" x2="108" y2="100" stroke="#78909c" stroke-width="2" />

  <!-- Subtle fusion elements -->
  <circle cx="95" cy="95" r="3" fill="#ffca28" />
  <circle cx="105" cy="105" r="3" fill="#ffca28" />
</svg>